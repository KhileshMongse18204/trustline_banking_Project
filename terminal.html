<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrustLine Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/logo.svg">
  <link rel="stylesheet" href="CSS/style.css">
  <style>
    :root{
      --term-bg: #0d1117;
      --term-green: #00ff88;
      --term-blue: #58a6ff;
      --term-yellow: #f0e68c;
      --term-red: #ff6b6b;
      --term-white: #e6edf3;
      --term-dim: #8b949e;
      --term-border: #30363d;
    }
    
    *{box-sizing:border-box}
    
    body {
      margin: 0;
      padding: 0;
      background: var(--term-bg);
      color: var(--term-white);
      font-family: 'Fira Code', 'Consolas', monospace;
      min-height: 100vh;
    }
    
    .terminal-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .terminal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid var(--term-border);
      border-radius: 8px 8px 0 0;
    }
    
    .terminal-buttons {
      display: flex;
      gap: 8px;
    }
    
    .terminal-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .terminal-btn.red { background: #ff5f56; }
    .terminal-btn.yellow { background: #ffbd2e; }
    .terminal-btn.green { background: #27c93f; }
    
    .terminal-title {
      color: var(--term-dim);
      font-size: 13px;
    }
    
    .terminal-body {
      background: #0d1117;
      border: 1px solid var(--term-border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      min-height: 500px;
      padding: 20px;
    }
    
    .terminal-output {
      white-space: pre-wrap;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    
    .terminal-output .error { color: var(--term-red); }
    .terminal-output .success { color: var(--term-green); }
    .terminal-output .info { color: var(--term-blue); }
    .terminal-output .warning { color: var(--term-yellow); }
    .terminal-output .dim { color: var(--term-dim); }
    
    .terminal-input-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .terminal-prompt {
      color: var(--term-green);
      font-weight: 500;
    }
    
    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--term-white);
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      outline: none;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--term-blue);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    
    .back-btn:hover {
      text-decoration: underline;
    }
    
    .menu-option {
      display: block;
      padding: 4px 0;
      color: var(--term-white);
    }
    
    .menu-option .number {
      color: var(--term-blue);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
    }
    
    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--term-border);
    }
    
    th {
      color: var(--term-blue);
    }
    
    .transaction-deposit { color: var(--term-green); }
    .transaction-withdraw { color: var(--term-red); }
    .transaction-transfer-out { color: var(--term-red); }
    .transaction-transfer-in { color: var(--term-green); }
  </style>
</head>
<body>
  <div class="terminal-container">
    <a href="Home.html" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Back to Home
    </a>
    
    <div class="terminal-header">
      <div class="terminal-buttons">
        <div class="terminal-btn red"></div>
        <div class="terminal-btn yellow"></div>
        <div class="terminal-btn green"></div>
      </div>
      <div class="terminal-title">trustline-terminal — bash</div>
    </div>
    
    <div class="terminal-body">
      <div class="terminal-output" id="terminalOutput"></div>
      <div class="terminal-input-line">
        <span class="terminal-prompt">$</span>
        <input type="text" class="terminal-input" id="terminalInput" autofocus placeholder="Type a command...">
      </div>
    </div>
  </div>

  <script src="JS/terminal_script.js"></script>
</body>
</html>
